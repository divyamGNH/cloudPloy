name: CD Builder Container workflow

on:
    push :
        paths :
            - build-server/**

jobs:
    test: 
        runs-on: ubuntu-latest

        steps :
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with: 
                aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
                aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
                aws-region: ap-south-1

            - name: Login to ECR
              run: aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 801795967285.dkr.ecr.ap-south-1.amazonaws.com

            - name: Build docker image
              run: docker build -t vercelclone .

            - name: Tagging the docker image
              run: docker tag vercelclone:latest 801795967285.dkr.ecr.ap-south-1.amazonaws.com/vercelclone:latest

            - name: Push Docker image to ECR
              run: docker push 801795967285.dkr.ecr.ap-south-1.amazonaws.com/vercelclone:latest

            - name: Register a new ECS task definition revision
              run: aws ecs register-task-definition --cli-input-json file://builder-server-task-definition.json 